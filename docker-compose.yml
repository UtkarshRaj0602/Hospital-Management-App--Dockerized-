version: "3.9"

services:
  backend:
    build: ./backend
    container_name: hospital_management_app
    ports:
      - "3000:3000"
    env_file:
      -  .env
    depends_on:
      - mysql
    networks:
      - hospital-app-network
    restart: always
  
  mysql:
    image: mysql:8.0
    container_name: mysql_db
    ports: 
      - "3306:3306"
    volumes:
      - mysql_db_data:/var/lib/mysql
      - ./backend/nodelogin.sql:/docker-entrypoint-initdb.d/nodelogin.sql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - hospital-app-network
    restart: always

volumes:
  mysql_db_data:

networks:
  hospital-app-network:
